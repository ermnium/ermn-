<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<title>ermn. · My Profile</title>
<link rel="icon" href="wicon.png">
<style>
:root {
  --accent: #3b5998;
  --body-bg: linear-gradient(180deg,#dfe7f3 0%,#f5f6f7 100%);
  --card-bg: #fff;
  --topbar-bg: #3b5998;
  --text: #333;
  --border: #b0b7c3;
  --card-header: linear-gradient(180deg,#e8edf7,#d8e0f0);
  --input-bg: #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Tahoma, Verdana, sans-serif; background: var(--body-bg); color: var(--text); min-height: 100vh; font-size: 13px; }

.topbar { background:var(--topbar-bg); height:44px; display:flex; align-items:center; padding:0 12px; gap:10px; position:sticky; top:0; z-index:50; box-shadow:0 2px 5px rgba(0,0,0,0.3); border-bottom:2px solid rgba(0,0,0,0.2); }
.topbar-logo { font-size:22px; font-weight:bold; color:white; letter-spacing:-1px; font-style:italic; text-shadow:1px 1px 2px rgba(0,0,0,0.3); }
.topbar-nav { display:flex; gap:4px; margin-left:10px; }
.topbar-nav a { color:rgba(255,255,255,0.85); font-size:12px; text-decoration:none; padding:4px 8px; border-radius:2px; }
.topbar-nav a:hover { background:rgba(255,255,255,0.15); color:white; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
.topbar-right button { background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.3); padding:4px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
.topbar-right button:hover { background:rgba(255,255,255,0.35); }

.container { max-width: 600px; margin: 20px auto; padding: 0 10px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  margin-bottom: 12px;
}
.card-title {
  background: var(--card-header);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  color: var(--accent);
}
.card-body { padding: 14px; }

/* Profile header redesigned for visual harmony */
.profile-banner { height: 100px; background: #ddd; background-size: cover; background-position: center; border-bottom: 1px solid var(--border); display: none; }
.profile-header { display: flex; gap: 14px; align-items: center; margin-top: 10px; }
#picDisplay { width: 70px; height: 70px; object-fit: cover; border: 2px solid var(--border); border-radius: 2px; background: var(--card-bg); flex-shrink: 0; }
.profile-info h2 { font-size: 18px; color: var(--accent); line-height: 1.2; margin-bottom: 2px; }
.profile-info .bio-display { font-style: italic; color: #666; font-size: 12px; margin-top: 2px; line-height: 1.3; }
.stats { display: flex; gap: 12px; margin-top: 4px; font-size: 12px; color: #666; }
.stats span strong { color: var(--accent); }

label { display: block; font-size: 12px; font-weight: bold; color: #444; margin-bottom: 3px; margin-top: 10px; }
input[type=text], input[type=password], textarea {
  width: 100%;
  border: 1px solid var(--border);
  padding: 5px 7px;
  font-family: inherit;
  font-size: 13px;
  background: var(--input-bg);
  color: var(--text);
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; }
textarea { resize: vertical; height: 64px; }
input[type=file] { font-size: 12px; margin-bottom: 4px; }

.btn {
  background: linear-gradient(180deg,#5274b3,#3b5998);
  color: white;
  border: 1px solid #2a4070;
  padding: 5px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
}
.btn:hover { background: linear-gradient(180deg,#6080bf,#4a6aaa); }
.btn-red { background: linear-gradient(180deg,#e55,#c33); border-color: #a22; }
.btn-red:hover { background: linear-gradient(180deg,#f66,#d44); }

.msg { font-size: 12px; margin-top: 6px; min-height: 16px; }
.ok { color: #080; }
.err { color: #c00; }

/* My posts */
.post { border-bottom: 1px solid #eee; padding: 8px 0; }
.post:last-child { border-bottom: none; }
.post-text { margin: 3px 0; line-height: 1.5; }
.post-time { font-size: 11px; color: #888; }
.delete-post { color: #bbb; cursor: pointer; font-size: 11px; float: right; }
.delete-post:hover { color: #c00; }
/* Badges handled by app.js */
  .material-icons { font-family: "Material Icons"; font-size: 1.2em; vertical-align: middle; line-height: 1; position: relative; top: -1px; margin-right: 2px; }
  .topbar-nav .material-icons { font-size: 1.3em; margin-right: 3px; }
  .card-title  .material-icons { font-family: "Material Icons"; font-size: 1.2em; vertical-align: middle; line-height: 1; position: relative; top: -1px; margin-right: 2px; }
  .topbar-nav .material-icons { font-size: 1.3em; margin-right: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">ermn.</span>
  <nav class="topbar-nav">
    <a href="feed.html"><span class="material-icons">home</span> Home</a>
    <a href="algo_feed.html"><span class="material-icons">explore</span> Feed</a>
    <a href="profile.html"><span class="material-icons">person</span> Profile</a>
  </nav>
  <div class="topbar-right">
    <button onclick="location.href='settings.html'"><span class="material-icons" style="font-size:14px;">settings</span> Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title"><span class="material-icons">person</span> My Profile</div>
    <div id="userBanner" class="profile-banner" style="display:none;"></div>
    <div class="profile-header" style="padding: 0 14px 14px;">
      <img id="picDisplay" src="empty.jpg" onerror="this.src='empty.jpg'">
      <div class="profile-info">
        <h2 id="uname"></h2>
        <div id="bioDisplay" class="bio-display">No bio yet.</div>
        <div class="stats">
          <span><strong id="statFollowers">0</strong> followers</span>
          <span><strong id="statFollowing">0</strong> following</span>
          <span><strong id="statPosts">0</strong> posts</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="material-icons">edit</span> Edit Profile</div>
    <div class="card-body">
      <label>Profile Picture <span style="font-weight:normal;color:#888">(Recommended: 400x400px Square)</span></label>
      <input type="file" id="fileInput" accept="image/*">
      <button class="btn" onclick="savePic()">Update Picture</button>
      <div class="msg ok" id="picMsg"></div>

      <label>Profile Banner <span style="font-weight:normal;color:#888">(Recommended: 1500x500px 3:1 Ratio)</span></label>
      <input type="file" id="bannerInput" accept="image/*">
      <button class="btn" onclick="saveBanner()">Update Banner</button>
      <div class="msg ok" id="bannerMsg"></div>

      <label>Bio <span style="font-weight:normal;color:#888">(max 160 chars)</span></label>
      <textarea id="bioInput" maxlength="160" placeholder="Tell people about yourself..."></textarea>
      <button class="btn" onclick="saveBio()">Save Bio</button>
      <div class="msg ok" id="bioMsg"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="material-icons">music_note</span> Profile Music</div>
    <div class="card-body">
      <div id="selectedMusic" style="display:none;margin-bottom:12px;padding:10px;background:#f8f9fb;border:1px solid #9196a1;border-radius:0;display:flex;align-items:center;gap:12px;box-shadow:inset 1px 1px 0 white;">
        <img id="selArt" src="" style="width:40px;height:40px;border-radius:0;object-fit:cover;border:1px solid #777;">
        <div style="flex:1">
          <div id="selTitle" style="font-weight:bold;font-size:14px;"></div>
          <div id="selArtist" style="font-size:12px;color:#666;"></div>
        </div>
        <button class="btn btn-red" onclick="removeMusic()" style="margin:0;padding:4px 8px;">Remove</button>
      </div>

      <div id="musicOptions" style="display:none;margin-bottom:12px;padding:10px;border:1px solid #9196a1;border-radius:0;background:#fcfcfc;">
        <label style="font-size:12px;margin-bottom:5px;display:block;">Song Preview Start: <span id="startVal">0</span>s</label>
        <input type="range" id="startSlider" min="0" max="25" value="0" style="width:100%" oninput="updateStartVal(this.value)" onchange="saveMusicStart(this.value)">
        <p style="font-size:10px;color:#888;margin-top:5px;">Choose which part of the 30s preview to start at.</p>
      </div>

      <label>Search for a song</label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="musicSearch" placeholder="Enter song or artist name..." onkeydown="if(event.key==='Enter')searchMusic()">
        <button class="btn" onclick="searchMusic()" style="margin:0;">Search</button>
      </div>
      <div id="musicResults" style="margin-top:10px;max-height:200px;overflow-y:auto;border:1px solid #eee;display:none;"></div>
      <div class="msg ok" id="musicMsg"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="material-icons">description</span> My Posts</div>
    <div class="card-body" id="myPosts">
      <div style="color:#888;font-style:italic;">Loading...</div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const me = localStorage.getItem("currentUser");
if (!me) location.href = "index.html";

let tempPic = null;
document.getElementById("fileInput").addEventListener("change", function(e) {
  const r = new FileReader();
  r.onload = function() { tempPic = r.result; document.getElementById("picDisplay").src = r.result; };
  r.readAsDataURL(e.target.files[0]);
});

async function savePic() {
  if (!tempPic) { document.getElementById("picMsg").innerText = "Please select a file first."; document.getElementById("picMsg").className = "msg err"; return; }
  const { error } = await sb.from("users").update({ pic: tempPic }).ilike("username", me);
  if (error) { document.getElementById("picMsg").innerText = "Error: " + error.message; document.getElementById("picMsg").className = "msg err"; return; }
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = async () => {
    const { error } = await sb.from("users").update({ pic: r.result }).ilike("username", me);
    if (!error) {
      document.getElementById("picDisplay").src = r.result;
      document.getElementById("picMsg").innerText = "Picture updated!";
      setTimeout(()=>document.getElementById("picMsg").innerText="", 3000);
    }
  };
  r.readAsDataURL(file);
}

function saveBanner() {
  const file = document.getElementById("bannerInput").files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = async () => {
    const { error } = await sb.from("users").update({ banner: r.result }).ilike("username", me);
    if (!error) {
      document.getElementById("userBanner").style.backgroundImage = "url('" + r.result + "')";
      document.getElementById("userBanner").style.display = "block";
      document.getElementById("bannerMsg").innerText = "Banner updated!";
      setTimeout(()=>document.getElementById("bannerMsg").innerText="", 3000);
    }
  };
  r.readAsDataURL(file);
}

async function saveBio() {
  const bio = document.getElementById("bioInput").value.trim();
  const { error } = await sb.from("users").update({ bio }).ilike("username", me);
  if (error) { document.getElementById("bioMsg").innerText = "Error: " + error.message; document.getElementById("bioMsg").className = "msg err"; return; }
  document.getElementById("bioMsg").innerText = "Bio saved!";
  document.getElementById("bioMsg").className = "msg ok";
  document.getElementById("bioDisplay").innerText = bio || "No bio yet.";
}

async function searchMusic() {
  const q = document.getElementById("musicSearch").value.trim();
  if (!q) return;
  const resEl = document.getElementById("musicResults");
  resEl.innerHTML = "<div style='padding:10px;color:#888'>Searching...</div>";
  resEl.style.display = "block";

  try {
    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=10`);
    const data = await response.json();
    if (!data.results || data.results.length === 0) {
      resEl.innerHTML = "<div style='padding:10px;color:#888'>No results found.</div>";
      return;
    }
    resEl.innerHTML = "";
    data.results.forEach(track => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #eee;cursor:pointer;";
      d.onclick = () => selectMusic(track);
      d.innerHTML = `
        <img src="${track.artworkUrl60}" style="width:30px;height:30px;border-radius:2px;">
        <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          <div style="font-weight:bold;font-size:12px;">${escapeHtml(track.trackName)}</div>
          <div style="font-size:11px;color:#666;">${escapeHtml(track.artistName)}</div>
        </div>
        <span style="font-size:11px;color:var(--accent);font-weight:bold;">Select</span>
      `;
      resEl.appendChild(d);
    });
  } catch (e) {
    resEl.innerHTML = "<div style='padding:10px;color:#c00'>Error searching music.</div>";
  }
}

async function selectMusic(track) {
  const musicData = {
    trackId: track.trackId,
    trackName: track.trackName,
    artistName: track.artistName,
    previewUrl: track.previewUrl,
    albumArt: track.artworkUrl100
  };
  
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  
  if (!userId) {
    document.getElementById("musicMsg").innerText = "Session expired. Please log in again.";
    document.getElementById("musicMsg").className = "msg err";
    return;
  }

  const { error } = await sb.from("users").update({ spotify_data: musicData }).eq("id", userId);
  if (error) {
    document.getElementById("musicMsg").innerText = "Error saving music: " + error.message;
    document.getElementById("musicMsg").className = "msg err";
    return;
  }
  
  displaySelectedMusic(musicData);
  document.getElementById("musicResults").style.display = "none";
  document.getElementById("musicSearch").value = "";
  document.getElementById("musicMsg").innerText = "Profile music updated!";
  document.getElementById("musicMsg").className = "msg ok";
  setTimeout(() => document.getElementById("musicMsg").innerText = "", 3000);
}

async function removeMusic() {
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  if (!userId) return;
  const { error } = await sb.from("users").update({ spotify_data: null }).eq("id", userId);
  if (error) return;
  document.getElementById("selectedMusic").style.display = "none";
  document.getElementById("musicOptions").style.display = "none";
  document.getElementById("musicMsg").innerText = "Profile music removed.";
  setTimeout(() => document.getElementById("musicMsg").innerText = "", 3000);
}

function displaySelectedMusic(data) {
  if (!data) {
    document.getElementById("selectedMusic").style.display = "none";
    return;
  }
  document.getElementById("selectedMusic").style.display = "flex";
  document.getElementById("selArt").src = data.albumArt;
  document.getElementById("selTitle").innerText = data.trackName;
  document.getElementById("selArtist").innerText = data.artistName;
  
  document.getElementById("musicOptions").style.display = "block";
  document.getElementById("startSlider").value = data.startTime || 0;
  document.getElementById("startVal").innerText = data.startTime || 0;
}

function updateStartVal(val) {
  document.getElementById("startVal").innerText = val;
}

async function saveMusicStart(val) {
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  if (!userId) return;
  const { data: user } = await sb.from("users").select("spotify_data").eq("id", userId).maybeSingle();
  if (user && user.spotify_data) {
    user.spotify_data.startTime = val;
    await sb.from("users").update({ spotify_data: user.spotify_data }).eq("id", userId);
    document.getElementById("musicMsg").innerText = "Start time updated!";
    setTimeout(() => document.getElementById("musicMsg").innerText = "", 2000);
  }
}

function escapeHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function timeAgo(d) { const diff=Math.floor((Date.now()-new Date(d))/1000); if(diff<60)return diff+"s ago"; if(diff<3600)return Math.floor(diff/60)+"m ago"; if(diff<86400)return Math.floor(diff/3600)+"h ago"; return Math.floor(diff/86400)+"d ago"; }

async function votePoll(postId, optionIndex) {
  if (!me) return;
  const { data: existingVote } = await sb.from("poll_votes").select("*").eq("post_id", postId).eq("username", me).maybeSingle();
  if (existingVote) {
    if (existingVote.option_index === optionIndex) return;
    await sb.from("poll_votes").update({ option_index: optionIndex }).eq("post_id", postId).eq("username", me);
    const { data: poll } = await sb.from("polls").select("options").eq("post_id", postId).single();
    if (poll) {
      poll.options[existingVote.option_index].votes = Math.max(0, (poll.options[existingVote.option_index].votes||0) - 1);
      poll.options[optionIndex].votes = (poll.options[optionIndex].votes||0) + 1;
      await sb.from("polls").update({ options: poll.options }).eq("post_id", postId);
    }
  } else {
    await sb.from("poll_votes").insert({ post_id: postId, username: me, option_index: optionIndex });
    const { data: poll } = await sb.from("polls").select("options").eq("post_id", postId).single();
    if (poll) {
      poll.options[optionIndex].votes = (poll.options[optionIndex].votes||0) + 1;
      await sb.from("polls").update({ options: poll.options }).eq("post_id", postId);
    }
  }
  loadPosts();
}

async function deletePost(postId) {
  if (!(await uiConfirm("Delete this post?"))) return;
  await sb.from("likes").delete().eq("post_id", postId);
  await sb.from("comments").delete().eq("post_id", postId);
  await sb.from("posts").delete().eq("id", postId).eq("username", me);
  loadPosts();
}

async function loadPosts() {
  const { data: posts } = await sb.from("posts").select("id, text, created_at").ilike("username", me).order("created_at", { ascending: false });
  const postIds = (posts || []).map(p => p.id);
  const [{ data: polls }, { data: pollVotes }] = await Promise.all([
    postIds.length ? sb.from("polls").select("*").in("post_id", postIds) : Promise.resolve({ data: [] }),
    postIds.length ? sb.from("poll_votes").select("post_id,option_index").in("post_id", postIds).eq("username", me) : Promise.resolve({ data: [] })
  ]);
  const pollMap = {};
  (polls || []).forEach(pl => { pollMap[pl.post_id] = pl.options; });
  const myVoteMap = {};
  (pollVotes || []).forEach(pv => { myVoteMap[pv.post_id] = pv.option_index; });

  const el = document.getElementById("myPosts");
  if (!posts || !posts.length) { el.innerHTML = "<div style='color:#888;font-style:italic;'>No posts yet.</div>"; return; }
  el.innerHTML = "";
  for (const p of posts) {
    let pollHtml = '';
    if (pollMap[p.id]) {
      const options = pollMap[p.id];
      const myVote = myVoteMap[p.id];
      const totalVotes = options.reduce((sum, opt) => sum + (opt.votes||0), 0);
      pollHtml = '<div class="poll-container" style="margin:10px 0;background:#f9f9f9;border:1px solid #eee;border-radius:4px;padding:10px;">';
      options.forEach((opt, idx) => {
        const pct = totalVotes > 0 ? Math.round(((opt.votes||0) / totalVotes) * 100) : 0;
        const isMyVote = myVote === idx;
        pollHtml += '<div class="poll-option" style="margin-bottom:6px;position:relative;cursor:pointer;" onclick="votePoll('+p.id+', '+idx+')">'+
                      '<div class="poll-bar" style="position:absolute;left:0;top:0;bottom:0;background:'+(isMyVote?'#d0e0ff':'#e0e0e0')+';width:'+pct+'%;border-radius:2px;z-index:1;"></div>'+
                      '<div style="position:relative;z-index:2;display:flex;justify-content:space-between;padding:4px 8px;font-size:13px;font-weight:'+(isMyVote?'bold':'normal')+';">'+
                        '<span>'+escapeHtml(opt.text)+' '+(isMyVote?'<span class="material-icons" style="font-size:14px;vertical-align:middle;">check</span>':'')+'</span><span>'+pct+'%</span>'+
                      '</div>'+
                    '</div>';
      });
      pollHtml += '<div style="font-size:11px;color:#888;text-align:right;">'+totalVotes+' vote'+(totalVotes!==1?'s':'')+'</div></div>';
    }

    const d = document.createElement("div");
    d.className = "post";
    d.innerHTML = '<span class="delete-post" onclick="deletePost(' + p.id + ')"><span class="material-icons" style="font-size:14px;vertical-align:middle;">delete</span> delete</span>' +
      '<div class="post-text">' + escapeHtml(p.text) + '</div>' +
      pollHtml +
      '<div class="post-time">' + timeAgo(p.created_at) + '</div>';
    el.appendChild(d);
  }
  document.getElementById("statPosts").innerText = posts.length;
}

async function load() {
  const { count: fc } = await sb.from("follows").select("*",{count:"exact",head:true}).ilike("following", me);
  const { count: fgc } = await sb.from("follows").select("*",{count:"exact",head:true}).ilike("follower", me);
  document.getElementById("uname").innerText = "@" + me;
  const { data: user } = await sb.from("users").select("pic, bio, verified, is_developer, banner, spotify_data").ilike("username", me).maybeSingle();
  if (user) {
    if (user.pic) document.getElementById("picDisplay").src = user.pic;
    if (user.bio) {
      document.getElementById("bioDisplay").innerText = user.bio;
      document.getElementById("bioInput").value = user.bio;
    }
    if (user.banner) {
      document.getElementById("userBanner").style.backgroundImage = "url('" + user.banner + "')";
      document.getElementById("userBanner").style.display = "block";
    }
    if (user.spotify_data) {
      displaySelectedMusic(user.spotify_data);
    }
    let badges = '';
    if (user.verified) badges += ' <span class="badge-icon badge-verified" data-title="Verified User">&nbsp;</span>';
    if (user.is_developer) badges += ' <span class="badge-icon badge-developer" data-title="Developer">&nbsp;</span>';
    document.getElementById("uname").innerHTML = "@" + escapeHtml(me) + badges;
  }
  document.getElementById("statFollowers").innerText = fc || 0;
  document.getElementById("statFollowing").innerText = fgc || 0;
  await loadPosts();
}

load();
</script>
<script src="dev_tools_loader.js"></script>
</body>
</html>
