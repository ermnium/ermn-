<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<title>ermn. · User Profile</title>
<link rel="icon" href="wicon.png">
<style>
:root {
  --accent: #3b5998;
  --body-bg: linear-gradient(180deg,#dfe7f3 0%,#f5f6f7 100%);
  --card-bg: #fff;
  --topbar-bg: #3b5998;
  --text: #333;
  --border: #b0b7c3;
  --card-header: linear-gradient(180deg,#e8edf7,#d8e0f0);
  --input-bg: #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Tahoma, Verdana, sans-serif; background: var(--body-bg); color: var(--text); min-height: 100vh; font-size: 13px; }

.topbar { background:var(--topbar-bg); height:44px; display:flex; align-items:center; padding:0 12px; gap:10px; position:sticky; top:0; z-index:50; box-shadow:0 2px 5px rgba(0,0,0,0.3); border-bottom:2px solid rgba(0,0,0,0.2); }
.topbar-logo { font-size:22px; font-weight:bold; color:white; letter-spacing:-1px; font-style:italic; text-shadow:1px 1px 2px rgba(0,0,0,0.3); }
.topbar-nav { display:flex; gap:4px; margin-left:10px; }
.topbar-nav a { color:rgba(255,255,255,0.85); font-size:12px; text-decoration:none; padding:4px 8px; border-radius:2px; }
.topbar-nav a:hover { background:rgba(255,255,255,0.15); color:white; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
.topbar-right button { background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.3); padding:4px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
.topbar-right button:hover { background:rgba(255,255,255,0.35); }

.container { max-width: 680px; margin: 20px auto; padding: 0 10px; }

.card { background: var(--card-bg); border: 1px solid var(--border); margin-bottom: 12px; }
.card-title {
  background: var(--card-header);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  color: var(--accent);
}
.card-body { padding: 14px; }

/* Profile header redesigned for visual harmony */
.profile-banner { height: 100px; background: #ddd; background-size: cover; background-position: center; border-bottom: 1px solid var(--border); display: none; }
.profile-header { display: flex; gap: 14px; align-items: flex-start; padding: 14px; }
#userPic { width: 80px; height: 80px; object-fit: cover; border: 3px solid var(--border); border-radius: 2px; flex-shrink: 0; background: var(--card-bg); }
.profile-info { flex: 1; }
.profile-info h2 { font-size: 18px; color: var(--accent); line-height: 1.2; margin-bottom: 2px; }
.bio-text { font-style: italic; color: #555; font-size: 13px; margin-top: 4px; line-height: 1.4; }
.stats { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: #555; border: none; padding: 0; }
.stat-item { text-align: left; padding: 0; border: none; margin: 0; cursor: pointer; display: inline; }
.stat-item strong { display: inline; font-size: 13px; color: var(--accent); }
.stat-item span { font-size: 13px; color: #555; }
.stat-item:hover strong { text-decoration: underline; }

#followBtn {
  background: linear-gradient(180deg,#5274b3,#3b5998);
  color: white;
  border: 1px solid #2a4070;
  padding: 5px 18px;
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
#followBtn:hover { background: linear-gradient(180deg,#6080bf,#4a6aaa); }
#followBtn.following { background: linear-gradient(180deg,#d0f0d0,#b8e8b8); color: #2a6e2a; border-color: #8ec88e; }
#followBtn.following:hover { background: linear-gradient(180deg,#b8e8b8,#a0d8a0); }

/* Posts */
.post { border-bottom: 1px solid #eee; padding: 10px 0; }
.post:last-child { border-bottom: none; }
.post-text { line-height: 1.5; margin-bottom: 5px; }
.post-footer { display: flex; align-items: center; gap: 12px; }
.post-time { font-size: 11px; color: #888; }
.heart { cursor: pointer; color: #bbb; font-size: 14px; }
.heart:hover { color: #e74c3c; }
.heart.liked { color: #e74c3c; }
.like-count { font-size: 12px; color: #555; }

/* Followers/following modal */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  width: 300px;
  max-height: 400px;
  display: flex;
  flex-direction: column;
}
.modal-title {
  background: var(--card-header);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  font-weight: bold;
  font-size: 13px;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close { cursor: pointer; color: #888; font-size: 16px; }
.modal-close:hover { color: #333; }
.modal-list { overflow-y: auto; flex: 1; padding: 8px; }
.modal-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 4px;
  border-bottom: 1px solid #f0f0f0;
}
.modal-user:last-child { border-bottom: none; }
.modal-user img { width: 32px; height: 32px; object-fit: cover; border: 1px solid var(--border); }
.modal-user a { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 13px; }
.modal-user a:hover { text-decoration: underline; }
.poll-container { margin:10px 0; background:var(--card-header); border:1px solid var(--border); border-radius:4px; padding:10px; }
.poll-bar { background:rgba(255,255,255,0.1); }
  .material-icons { font-family: "Material Icons"; font-size: 1.2em; vertical-align: middle; line-height: 1; position: relative; top: -1px; margin-right: 2px; }
  .topbar-nav .material-icons { font-size: 1.3em; margin-right: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">ermn.</span>
  <nav class="topbar-nav">
    <a href="feed.html"><span class="material-icons">home</span> Home</a>
    <a href="algo_feed.html"><span class="material-icons">explore</span> Feed</a>
    <a href="profile.html"><span class="material-icons">person</span> Profile</a>
  </nav>
  <div class="topbar-right">
    <button onclick="history.back()"><span class="material-icons" style="font-size:14px;">arrow_back</span> Back</button>
    <button onclick="location.href='settings.html'"><span class="material-icons" style="font-size:14px;">settings</span> Settings</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div id="userBanner" class="profile-banner" style="display:none;"></div>
    <div class="profile-header">
      <img id="userPic" src="empty.jpg" onerror="this.src='empty.jpg'">
      <div class="profile-info">
        <h2 id="userName">Loading...</h2>
        <div class="bio-text" id="userBio"></div>
        <div class="stats">
          <div class="stat-item" onclick="openModal('followers')">
            <strong id="statFollowers">0</strong>
            <span>followers</span>
          </div>
          <div class="stat-item" onclick="openModal('following')">
            <strong id="statFollowing">0</strong>
            <span>following</span>
          </div>
          <div class="stat-item">
            <strong id="statPosts">0</strong>
            <span>posts</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body" style="padding-top: 0;">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap; margin-top: 15px; padding: 0 20px 20px;">

            <style>
              .music-banner {
                margin: 0;
                background: linear-gradient(180deg, #f8f9fb, #eceef2);
                border: 1px solid #9196a1;
                border-radius: 0px;
                padding: 4px 8px 4px 4px;
                box-shadow: 1px 1px 0px white inset;
                display: flex;
                align-items: center;
                gap: 10px;
                width: fit-content;
                max-width: 100%;
                cursor: pointer;
                transition: transform 0.2s;
              }
              .music-banner:hover { background: #f0f2f5; }
              .music-art-wrap { width: 36px; height: 36px; position: relative; flex-shrink: 0; }
              .music-art { width: 100%; height: 100%; object-fit: cover; border: 1px solid #777; }
              .music-info { display: flex; flex-direction: column; overflow: hidden; max-width: 180px; }
              .music-title { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
              .music-artist { font-size: 9px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
              .music-controls { color: var(--accent); font-size: 14px; margin-left: 4px; }
            </style>

            <div id="musicBanner" class="music-banner" style="display:none;" onclick="toggleMusic()">
              <div class="music-art-wrap">
                <img id="musicArt" src="" class="music-art">
              </div>
              <div class="music-info">
                <div id="musicTitle" class="music-title"></div>
                <div id="musicArtist" class="music-artist"></div>
              </div>
              <div class="music-controls" id="musicStatus"><span class="material-icons">play_arrow</span></div>
            </div>
            
            <div id="profileActions">
              <button id="followBtn" onclick="toggleFollow()" style="display:none">Follow</button>
              <button id="blockBtn" onclick="blockUser()" style="display:none;background:#e55;color:white;border:1px solid #c33;padding:5px 10px;font-size:13px;font-weight:bold;cursor:pointer;margin-left:6px;">Block</button>
              <span id="itsYou" style="display:none;font-style:italic;color:#888;font-size:12px;">This is you · <a href="profile.html" style="color:var(--accent)">Edit profile</a></span>
            </div>
          </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="postsTitle"><span class="material-icons">description</span> Posts</div>
    <div class="card-body" id="userPosts">
      <div style="color:#888;font-style:italic;">Loading...</div>
    </div>
  </div>
</div>

<!-- Followers/Following Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Followers</span>
      <span class="modal-close" onclick="closeModal()"><span class="material-icons">close</span></span>
    </div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const me = localStorage.getItem("currentUser");
const params = new URLSearchParams(location.search);
const viewUser = params.get("user") || me;
let isFollowing = false;
let isBlocked = false;
let userMusicData = null;

applyTheme();

function toggleMusic() {
  if (!userMusicData) return;
  ProfileMusicPlayer.toggle(userMusicData);
}

// Subscribe to player state changes
ProfileMusicPlayer.onStateChange = (playing) => {
  const art = document.getElementById("musicArt");
  const status = document.getElementById("musicStatus");
  if (ProfileMusicPlayer.currentTrackId === userMusicData?.trackId) {
    if (playing) {
      status.innerHTML = '<span class="material-icons">pause</span>';
    } else {
      status.innerHTML = '<span class="material-icons">play_arrow</span>';
    }
  } else {
    status.innerHTML = '<span class="material-icons">play_arrow</span>';
  }
};

async function toggleFollow() {
  if (!me) return;
  const btn = document.getElementById("followBtn");
  if (isFollowing) {
    await sb.from("follows").delete().eq("follower", me).ilike("following", viewUser);
    isFollowing = false;
    btn.innerText = "Follow";
    btn.className = "";
    const fc = parseInt(document.getElementById("statFollowers").innerText);
    if (!isNaN(fc)) document.getElementById("statFollowers").innerText = Math.max(0, fc - 1);
  } else {
    // Check if target is private
    const { data: targetData } = await sb.from("users").select("is_private").ilike("username", viewUser).maybeSingle();
    if (targetData && targetData.is_private) {
      const { data: existingReq } = await sb.from("follow_requests").select("requester").eq("requester", me).ilike("target", viewUser).maybeSingle();
      if (existingReq) {
        await sb.from("follow_requests").delete().eq("requester", me).ilike("target", viewUser);
        btn.innerText = "Follow";
      } else {
        await sb.from("follow_requests").insert({ requester: me, target: viewUser });
        btn.innerHTML = '<span class="material-icons" style="font-size:14px;">hourglass_empty</span> Requested';
      }
    } else {
      await sb.from("follows").insert({ follower: me, following: viewUser });
      isFollowing = true;
      btn.innerHTML = '<span class="material-icons" style="font-size:14px;vertical-align:middle;">check</span> Following'; btn.classList.add("following");
      const fc = parseInt(document.getElementById("statFollowers").innerText);
      if (!isNaN(fc)) document.getElementById("statFollowers").innerText = fc + 1;
    }
  }
}

async function blockUser() {
  if (!me || me === viewUser) return;
  if (isBlocked) {
    await unblockUser(viewUser);
  } else {
    await blockUserFromFeed(viewUser);
  }
}

async function likePost(postId, el) {
  if (!me) return;
  const { data: existing } = await sb.from("likes").select("post_id").eq("post_id", postId).eq("username", me).maybeSingle();
  if (existing) {
    await sb.from("likes").delete().eq("post_id", postId).eq("username", me);
    el.classList.remove("liked");
    const cnt = el.nextElementSibling;
    cnt.innerText = (parseInt(cnt.innerText) - 1) + " likes";
  } else {
    await sb.from("likes").insert({ post_id: postId, username: me });
    el.classList.add("liked");
    const cnt = el.nextElementSibling;
    cnt.innerText = (parseInt(cnt.innerText) + 1) + " likes";
  }
}

async function openModal(type) {
  document.getElementById("modalBackdrop").className = "modal-backdrop open";
  document.getElementById("modalTitle").innerText = type === "followers" ? "Followers" : "Following";
  const list = document.getElementById("modalList");
  list.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";

  let usernames = [];
  if (type === "followers") {
    const { data } = await sb.from("follows").select("follower").ilike("following", viewUser);
    usernames = (data || []).map(r => r.follower);
  } else {
    const { data } = await sb.from("follows").select("following").ilike("follower", viewUser);
    usernames = (data || []).map(r => r.following);
  }

  if (!usernames.length) { list.innerHTML = "<div style='padding:10px;color:#888;font-style:italic;'>Nobody here yet.</div>"; return; }

  const { data: users } = await sb.from("users").select("username, pic").in("username", usernames);
  const uMap = {};
  (users || []).forEach(u => { uMap[u.username] = u; });

  list.innerHTML = "";
  for (const u of usernames) {
    const info = uMap[u] || {};
    const d = document.createElement("div");
    d.className = "modal-user";
    d.innerHTML = '<img src="' + escapeHtml(info.pic || "empty.jpg") + '" onerror="this.src=\'empty.jpg\'">' +
      '<a href="' + getUserPageLink(u) + '">@' + escapeHtml(u) + '</a>';
    list.appendChild(d);
  }
}

function closeModal() {
  document.getElementById("modalBackdrop").className = "modal-backdrop";
}

async function load() {
  document.title = "ermn. · @" + viewUser;

  const { data: user } = await sb.from("users").select("pic, bio, verified, is_developer, banner, is_private, spotify_data").ilike("username", viewUser).maybeSingle();
  const { count: fc } = await sb.from("follows").select("*",{count:"exact",head:true}).ilike("following", viewUser);
  const { count: fgc } = await sb.from("follows").select("*",{count:"exact",head:true}).ilike("follower", viewUser);
  const { data: posts } = await sb.from("posts").select("id, text, created_at").ilike("username", viewUser).order("created_at", { ascending: false });

  if (user && user.spotify_data) {
    userMusicData = user.spotify_data;
    document.getElementById("musicBanner").style.display = "flex";
    document.getElementById("musicArt").src = userMusicData.albumArt;
    document.getElementById("musicTitle").innerText = userMusicData.trackName;
    document.getElementById("musicArtist").innerText = userMusicData.artistName;
    
    // Check if this track is already playing
    if (ProfileMusicPlayer.isPlaying && ProfileMusicPlayer.currentTrackId === userMusicData.trackId) {
      document.getElementById("musicStatus").innerHTML = '<span class="material-icons">pause</span>';
    }
  }

  let badges = '';
  if (user && user.verified) badges += ' <span class="badge-icon badge-verified" data-title="Verified User">&nbsp;</span>';
  if (user && user.is_developer) badges += ' <span class="badge-icon badge-developer" data-title="Developer">&nbsp;</span>';
  document.getElementById("userName").innerHTML = "@" + escapeHtml(viewUser) + badges;
  document.getElementById("userBio").innerText = (user && user.bio) ? user.bio : "";
  document.getElementById("userPic").src = (user && user.pic) || "empty.jpg";
  if (user && user.banner) {
    document.getElementById("userBanner").style.backgroundImage = "url('" + user.banner + "')";
    document.getElementById("userBanner").style.display = "block";
  }
  document.getElementById("statFollowers").innerText = fc || 0;
  document.getElementById("statFollowing").innerText = fgc || 0;
  document.getElementById("postsTitle").innerHTML = '<span class="material-icons" style="vertical-align:middle;margin-right:4px;">description</span> Posts by @' + escapeHtml(viewUser);

  if (me && viewUser !== me) {
    document.getElementById("followBtn").style.display = "inline-block";
    document.getElementById("blockBtn").style.display = "inline-block";
    
    const { data: blockCheck } = await sb.from("blocked_users").select("blocked").eq("blocker", me).ilike("blocked", viewUser).maybeSingle();
    isBlocked = !!blockCheck;
    if (isBlocked) {
      document.getElementById("blockBtn").innerText = "Unblock";
    }
    const { data: fcheck } = await sb.from("follows").select("follower").eq("follower", me).ilike("following", viewUser).maybeSingle();
    isFollowing = !!fcheck;
    const btn = document.getElementById("followBtn");
    
    if (isFollowing) {
      btn.innerHTML = '<span class="material-icons" style="font-size:14px;vertical-align:middle;">check</span> Following';
      btn.className = "following";
    } else {
      const { data: reqCheck } = await sb.from("follow_requests").select("requester").eq("requester", me).ilike("target", viewUser).maybeSingle();
      if (reqCheck) btn.innerHTML = '<span class="material-icons" style="font-size:14px;">hourglass_empty</span> Requested';
      else btn.innerText = "Follow";
    }
  } else if (viewUser === me) {
    document.getElementById("itsYou").style.display = "block";
  }

  // Load this user's posts with like info
  let likedSet = new Set();
  if (me) {
    const { data: myLikes } = await sb.from("likes").select("post_id").eq("username", me);
    likedSet = new Set((myLikes || []).map(l => l.post_id));
  }
  const postIds = (posts || []).map(p => p.id);
  const [{ data: allLikes }, { data: polls }, { data: pollVotes }] = await Promise.all([
    postIds.length ? sb.from("likes").select("post_id").in("post_id", postIds) : Promise.resolve({ data: [] }),
    postIds.length ? sb.from("polls").select("*").in("post_id", postIds) : Promise.resolve({ data: [] }),
    postIds.length && me ? sb.from("poll_votes").select("post_id,option_index").in("post_id", postIds).eq("username", me) : Promise.resolve({ data: [] })
  ]);

  const likeMap = {};
  (allLikes || []).forEach(l => { likeMap[l.post_id] = (likeMap[l.post_id] || 0) + 1; });

  const pollMap = {};
  (polls || []).forEach(pl => { pollMap[pl.post_id] = pl.options; });
  const myVoteMap = {};
  (pollVotes || []).forEach(pv => { myVoteMap[pv.post_id] = pv.option_index; });

  let isPrivateAndNotFollowing = false;
  if (user && user.is_private && me !== viewUser) {
    isPrivateAndNotFollowing = !isFollowing;
  }

  if (isPrivateAndNotFollowing) {
    document.getElementById("userPosts").innerHTML = "<div style='color:#888;font-style:italic;padding:20px;text-align:center;'><span class='material-icons' style='display:block;font-size:32px;margin-bottom:10px;'>lock</span> This account is private. Follow to see their posts.</div>";
    document.getElementById("statFollowers").innerText = "-";
    document.getElementById("statFollowing").innerText = "-";
    document.getElementById("statPosts").innerText = "-";
    return;
  }

  const postsEl = document.getElementById("userPosts");
  if (!posts || !posts.length) { postsEl.innerHTML = "<div style='color:#888;font-style:italic;'>No posts yet.</div>"; return; }
  postsEl.innerHTML = "";
  for (const p of posts) {
    const liked = likedSet.has(p.id);
    const likeCount = likeMap[p.id] || 0;
    
    let pollHtml = '';
    if (pollMap[p.id]) {
      const options = pollMap[p.id];
      const myVote = myVoteMap[p.id];
      const totalVotes = options.reduce((sum, opt) => sum + (opt.votes||0), 0);
      pollHtml = '<div class="poll-container">';
      options.forEach((opt, idx) => {
        const pct = totalVotes > 0 ? Math.round(((opt.votes||0) / totalVotes) * 100) : 0;
        const isMyVote = myVote === idx;
        pollHtml += '<div class="poll-option" style="margin-bottom:6px;position:relative;cursor:pointer;" onclick="votePoll('+p.id+', '+idx+')">'+
                      '<div class="poll-bar" style="position:absolute;left:0;top:0;bottom:0;background:'+(isMyVote?'var(--accent)':'rgba(255,255,255,0.1)')+';opacity:'+(isMyVote?'0.2':'0.1')+';width:'+pct+'%;border-radius:2px;z-index:1;"></div>'+
                      '<div style="position:relative;z-index:2;display:flex;justify-content:space-between;padding:4px 8px;font-size:13px;font-weight:'+(isMyVote?'bold':'normal')+';">'+
                        '<span>'+escapeHtml(opt.text)+' '+(isMyVote?'<span class="material-icons" style="font-size:14px;vertical-align:middle;">check</span>':'')+'</span><span>'+pct+'%</span>'+
                      '</div>'+
                    '</div>';
      });
      pollHtml += '<div style="font-size:11px;color:#888;text-align:right;">'+totalVotes+' vote'+(totalVotes!==1?'s':'')+'</div></div>';
    }

    const d = document.createElement("div");
    d.className = "post";
    d.innerHTML = '<div class="post-text">' + escapeHtml(p.text) + '</div>' +
      pollHtml +
      '<div class="post-footer">' +
        '<span id="hlikes-' + p.id + '">' +
          '<span class="heart' + (liked ? " liked" : "") + '" onclick="likePost(' + p.id + ',this)">&#9829;</span> ' +
          '<span class="like-count">' + likeCount + ' likes</span>' +
        '</span>' +
        '<span class="post-time">' + timeAgo(p.created_at) + '</span>' +
      '</div>';
    postsEl.appendChild(d);
  }
}

load();
</script>
<script src="dev_tools_loader.js"></script>
</body>
</html>
