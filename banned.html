<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ermn. · Account Suspended</title>
<link rel="icon" href="wicon.png">  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --accent: #3b5998;
      --bg: linear-gradient(180deg, #dfe7f3 0%, #f5f6f7 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Tahoma, Verdana, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .card {
      background: white;
      border: 1px solid #b0b7c3;
      padding: 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .material-icons {
      font-size: 64px;
      color: #c00;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 15px;
      font-style: italic;
      letter-spacing: -1px;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #666;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 10px 25px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 2px;
      font-size: 13px;
    }
    .btn:hover {
      background: #4a6aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="material-icons">block</span>
    <h1>Account Suspended</h1>
    <p>
      Your account has been permanently suspended for violating our Terms of Service and community guidelines. 
      Access to this account is no longer available.
    </p>
    <a href="index.html" class="btn">Return to Home</a>
  </div>
</body>
</html>
