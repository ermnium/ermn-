<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ermn. · Profile</title>
<link rel="icon" href="wicon.png">
<style>
:root{--accent:#3b5998;--body-bg:linear-gradient(180deg,#dfe7f3,#f0f2f5);--card-bg:#fff;--topbar-bg:#3b5998;--text:#333;--border:#b0b7c3;--card-header:linear-gradient(180deg,#e8edf7,#d8e0f0);--input-bg:#fafafa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Tahoma,Verdana,sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:60px;}
.topbar{background:var(--topbar-bg);height:48px;display:flex;align-items:center;padding:0 12px;box-shadow:0 2px 6px rgba(0,0,0,0.3);}
.topbar-logo{font-size:22px;font-weight:bold;color:white;letter-spacing:-1px;font-style:italic;}
.main{padding:12px;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.card-title{background:var(--card-header);border-bottom:1px solid var(--border);padding:8px 12px;font-size:13px;font-weight:bold;color:var(--accent);}
.card-body{padding:14px;}
.profile-header{display:flex;gap:14px;align-items:center;margin-top:10px;}
#picDisplay{width:70px;height:70px;object-fit:cover;border:2px solid var(--border);border-radius:2px;background:var(--card-bg);flex-shrink:0;}
.profile-info h2{font-size:18px;color:var(--accent);line-height:1.2;}
.stats{display:flex;gap:12px;margin-top:4px;font-size:12px;color:#666;}
label{display:block;font-size:12px;font-weight:bold;color:#444;margin:10px 0 3px;}
input,textarea{width:100%;border:1px solid #bbb;padding:10px;font-family:inherit;font-size:14px;background:#fafafa;-webkit-appearance:none;}
textarea{height:80px;resize:vertical;}
input[type=file]{font-size:13px;padding:6px 0;}
.btn{background:var(--accent);color:white;border:none;padding:10px 20px;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;border-radius:2px;margin-top:8px;width:100%;}
.ok{color:#080;font-size:12px;margin-top:4px;} .err{color:#c00;font-size:12px;margin-top:4px;}
.post{border-bottom:1px solid #eee;padding:10px 0;}
.post:last-child{border-bottom:none;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--topbar-bg);border-top:2px solid rgba(0,0,0,0.2);display:flex;height:52px;z-index:50;}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.8);text-decoration:none;font-size:10px;gap:2px;}
.bottom-nav a .icon{font-size:20px;}
/* Badges handled by app.js */
/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:white;width:90%;max-width:300px;max-height:80vh;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;}
.modal-title{padding:12px;background:#f0f2f5;font-weight:bold;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;}
.modal-list{flex:1;overflow-y:auto;padding:10px;}
.modal-user{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eee;}
.modal-user img{width:32px;height:32px;object-fit:cover;border-radius:2px;}
.modal-user a{text-decoration:none;color:var(--accent);font-weight:bold;font-size:14px;}
.stats span{cursor:pointer;}
.stats strong{color:var(--accent);}
  .badge-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    background-color: var(--accent);
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    vertical-align: middle;
    margin-left: 3px;
    filter: var(--badge-glow);
  }
  .badge-verified {
    -webkit-mask-image: url('verifiedbadge.png');
    mask-image: url('verifiedbadge.png');
  }
  .badge-developer {
    -webkit-mask-image: url('devbadge.png');
    mask-image: url('devbadge.png');
  }
  .material-icons { font-family: "Material Icons"; font-size: 1.2em; vertical-align: middle; line-height: 1; position: relative; top: -1px; margin-right: 2px; }
</style>
</head>
<body>
<div class="topbar"><span class="topbar-logo">ermn.</span></div>
<div class="main">
  <div class="card">
    <div class="card-title"><span class="material-icons">person</span> My Profile</div>
      <div id="userBanner" style="height:100px;background:#ddd;background-size:cover;background-position:center;border-bottom:1px solid var(--border);display:none;"></div>
      <div class="profile-header" style="padding: 0 14px 14px;">
        <img id="picDisplay" src="empty.jpg" onerror="this.src='empty.jpg'">
        <div class="profile-info">
          <h2 id="uname"></h2>
          <div id="bioDisplay" style="font-style:italic;color:#666;font-size:12px;margin-top:2px;line-height:1.3;"></div>
          <div class="stats">
            <span onclick="openModal('followers')"><strong id="sF">0</strong> followers</span>
            <span onclick="openModal('following')"><strong id="sFg">0</strong> following</span>
            <span><strong id="sP">0</strong> posts</span>
          </div>
        </div>
      </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="material-icons">edit</span> Edit Profile</div>
    <div class="card-body">
      <label>Profile Picture <span style="font-weight:normal;color:#888">(Recommended: 400x400px Square)</span></label>
      <input type="file" id="fileInput" accept="image/*">
      <div id="picMsg" class="ok"></div>
      <label>Profile Banner <span style="font-weight:normal;color:#888">(Recommended: 1500x500px 3:1 Ratio)</span></label>
      <input type="file" id="bannerInput" accept="image/*">
      <div id="bannerMsg" class="ok"></div>
      <label>Bio</label>
      <textarea id="bioInput" maxlength="160" placeholder="About you..."></textarea>
      <button class="btn" onclick="saveBio()">Save Bio</button>
      <div id="bioMsg" class="ok"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="material-icons">music_note</span> Profile Music</div>
    <div class="card-body">
      <div id="selectedMusic" style="display:none;margin-bottom:12px;padding:10px;background:#f8f9fb;border:1px solid #9196a1;border-radius:0;display:flex;align-items:center;gap:12px;box-shadow:inset 1px 1px 0 white;">
        <img id="selArt" src="" style="width:40px;height:40px;border-radius:0;object-fit:cover;border:1px solid #777;">
        <div style="flex:1">
          <div id="selTitle" style="font-weight:bold;font-size:14px;"></div>
          <div id="selArtist" style="font-size:12px;color:#666;"></div>
        </div>
        <button class="btn btn-red" onclick="removeMusic()" style="margin:0;padding:4px 8px;width:auto;background:linear-gradient(180deg,#e55,#c33);color:white;border:1px solid #a22;">Remove</button>
      </div>

      <div id="musicOptions" style="display:none;margin-bottom:12px;padding:10px;border:1px solid #9196a1;border-radius:0;background:#fcfcfc;">
        <label style="font-size:12px;margin-bottom:5px;display:block;">Song Preview Start: <span id="startVal">0</span>s</label>
        <input type="range" id="startSlider" min="0" max="25" value="0" style="width:100%" oninput="updateStartVal(this.value)" onchange="saveMusicStart(this.value)">
        <p style="font-size:10px;color:#888;margin-top:5px;">Choose which part of the 30s preview to start at.</p>
      </div>

      <label>Search for a song</label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="musicSearch" placeholder="Song or artist..." onkeydown="if(event.key==='Enter')searchMusic()">
        <button class="btn" onclick="searchMusic()" style="margin:0;width:auto;padding:0 15px;">Search</button>
      </div>
      <div id="musicResults" style="margin-top:10px;max-height:200px;overflow-y:auto;border:1px solid #eee;display:none;"></div>
      <div id="musicMsg" class="ok"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="material-icons">description</span> My Posts</div>
    <div class="card-body" id="myPosts"><div style="color:#888;font-style:italic;">Loading...</div></div>
  </div>
</div>
<nav class="bottom-nav">
  <a href="mobile_feed.html"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title"><span id="modalTitle">Users</span><span onclick="closeModal()" style="cursor:pointer">✕</span></div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>
<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const me=localStorage.getItem("currentUser");
if(!me)location.href="mobile.html";

let tempPic=null;
document.getElementById("fileInput").addEventListener("change",function(e){
  const r=new FileReader();
  r.onload=async function(){
    tempPic=r.result;
    document.getElementById("picDisplay").src=r.result;
    const{error}=await sb.from("users").update({pic:r.result}).ilike("username",me);
    document.getElementById("picMsg").innerText=error?"Error saving pic.":"Picture updated!";
    setTimeout(()=>document.getElementById("picMsg").innerText="", 3000);
  };
  r.readAsDataURL(e.target.files[0]);
});

document.getElementById("bannerInput").addEventListener("change",function(e){
  const r=new FileReader();
  r.onload=async function(){
    document.getElementById("userBanner").style.backgroundImage="url('"+r.result+"')";
    document.getElementById("userBanner").style.display="block";
    const{error}=await sb.from("users").update({banner:r.result}).ilike("username",me);
    document.getElementById("bannerMsg").innerText=error?"Error saving banner.":"Banner updated!";
    setTimeout(()=>document.getElementById("bannerMsg").innerText="", 3000);
  };
  r.readAsDataURL(e.target.files[0]);
});

async function saveBio(){
  const bio=document.getElementById("bioInput").value.trim();
  const{error}=await sb.from("users").update({bio}).ilike("username",me);
  document.getElementById("bioMsg").innerText=error?"Error saving.":"Bio saved!";
  document.getElementById("bioDisplay").innerText=bio||"No bio yet.";
}

async function searchMusic() {
  const q = document.getElementById("musicSearch").value.trim();
  if (!q) return;
  const resEl = document.getElementById("musicResults");
  resEl.innerHTML = "<div style='padding:10px;color:#888'>Searching...</div>";
  resEl.style.display = "block";

  try {
    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=10`);
    const data = await response.json();
    if (!data.results || data.results.length === 0) {
      resEl.innerHTML = "<div style='padding:10px;color:#888'>No results found.</div>";
      return;
    }
    resEl.innerHTML = "";
    data.results.forEach(track => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #eee;cursor:pointer;";
      d.onclick = () => selectMusic(track);
      d.innerHTML = `
        <img src="${track.artworkUrl60}" style="width:30px;height:30px;border-radius:2px;">
        <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          <div style="font-weight:bold;font-size:12px;">${escapeHtml(track.trackName)}</div>
          <div style="font-size:11px;color:#666;">${escapeHtml(track.artistName)}</div>
        </div>
        <span style="font-size:11px;color:var(--accent);font-weight:bold;">Select</span>
      `;
      resEl.appendChild(d);
    });
  } catch (e) {
    resEl.innerHTML = "<div style='padding:10px;color:#c00'>Error searching music.</div>";
  }
}

async function selectMusic(track) {
  const musicData = {
    trackId: track.trackId,
    trackName: track.trackName,
    artistName: track.artistName,
    previewUrl: track.previewUrl,
    albumArt: track.artworkUrl100
  };
  
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  if (!userId) {
    document.getElementById("musicMsg").innerText = "Session expired.";
    document.getElementById("musicMsg").className = "err";
    return;
  }
  
  const { error } = await sb.from("users").update({ spotify_data: musicData }).eq("id", userId);
  if (error) {
    document.getElementById("musicMsg").innerText = "Error: " + error.message;
    document.getElementById("musicMsg").className = "err";
    return;
  }
  
  displaySelectedMusic(musicData);
  document.getElementById("musicResults").style.display = "none";
  document.getElementById("musicSearch").value = "";
  document.getElementById("musicMsg").innerText = "Profile music updated!";
  document.getElementById("musicMsg").className = "ok";
  setTimeout(() => document.getElementById("musicMsg").innerText = "", 3000);
}

async function removeMusic() {
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  if (!userId) return;
  const { error } = await sb.from("users").update({ spotify_data: null }).eq("id", userId);
  if (error) return;
  document.getElementById("selectedMusic").style.display = "none";
  document.getElementById("musicOptions").style.display = "none";
  document.getElementById("musicMsg").innerText = "Profile music removed.";
  setTimeout(() => document.getElementById("musicMsg").innerText = "", 3000);
}

function displaySelectedMusic(data) {
  if (!data) {
    document.getElementById("selectedMusic").style.display = "none";
    return;
  }
  document.getElementById("selectedMusic").style.display = "flex";
  document.getElementById("selArt").src = data.albumArt;
  document.getElementById("selTitle").innerText = data.trackName;
  document.getElementById("selArtist").innerText = data.artistName;
  
  document.getElementById("musicOptions").style.display = "block";
  document.getElementById("startSlider").value = data.startTime || 0;
  document.getElementById("startVal").innerText = data.startTime || 0;
}

function updateStartVal(val) {
  document.getElementById("startVal").innerText = val;
}

async function saveMusicStart(val) {
  const { data: { session } } = await sb.auth.getSession();
  const userId = session?.user?.id;
  if (!userId) return;
  const { data: user } = await sb.from("users").select("spotify_data").eq("id", userId).maybeSingle();
  if (user && user.spotify_data) {
    user.spotify_data.startTime = val;
    await sb.from("users").update({ spotify_data: user.spotify_data }).eq("id", userId);
    document.getElementById("musicMsg").innerText = "Start time updated!";
    setTimeout(() => document.getElementById("musicMsg").innerText = "", 2000);
  }
}

async function votePoll(postId, optionIndex) {
  if (!me) return;
  const { data: existingVote } = await sb.from("poll_votes").select("*").eq("post_id", postId).eq("username", me).maybeSingle();
  if (existingVote) {
    if (existingVote.option_index === optionIndex) return;
    await sb.from("poll_votes").update({ option_index: optionIndex }).eq("post_id", postId).eq("username", me);
    const { data: poll } = await sb.from("polls").select("options").eq("post_id", postId).single();
    if (poll) {
      poll.options[existingVote.option_index].votes = Math.max(0, (poll.options[existingVote.option_index].votes||0) - 1);
      poll.options[optionIndex].votes = (poll.options[optionIndex].votes||0) + 1;
      await sb.from("polls").update({ options: poll.options }).eq("post_id", postId);
    }
  } else {
    await sb.from("poll_votes").insert({ post_id: postId, username: me, option_index: optionIndex });
    const { data: poll } = await sb.from("polls").select("options").eq("post_id", postId).single();
    if (poll) {
      poll.options[optionIndex].votes = (poll.options[optionIndex].votes||0) + 1;
      await sb.from("polls").update({ options: poll.options }).eq("post_id", postId);
    }
  }
  load();
}

function getUserPageLink(username) {
  const isMobile = window.location.pathname.includes("mobile_");
  const page = isMobile ? "mobile_userpage.html" : "userpage.html";
  return page + "?user=" + encodeURIComponent(username);
}

async function openModal(type) {
  const bg = document.getElementById("modalBackdrop");
  bg.classList.add("open");
  document.getElementById("modalTitle").innerText = type==="followers"?"Followers":"Following";
  const list = document.getElementById("modalList");
  list.innerHTML = "<div style='color:#888'>Loading...</div>";
  let usernames = [];
  if (type === "followers") {
    const { data } = await sb.from("follows").select("follower").eq("following", me);
    usernames = (data || []).map(r => r.follower);
  } else {
    const { data } = await sb.from("follows").select("following").eq("follower", me);
    usernames = (data || []).map(r => r.following);
  }
  if (!usernames.length) { list.innerHTML = "<div style='color:#888;font-style:italic;'>Nobody here yet.</div>"; return; }
  const { data: users } = await sb.from("users").select("username, pic").in("username", usernames);
  const uMap = {}; (users || []).forEach(u => { uMap[u.username] = u; });
  list.innerHTML = "";
  for (const u of usernames) {
    const info = uMap[u] || {};
    const d = document.createElement("div"); d.className = "modal-user";
    d.innerHTML = '<img src="' + (info.pic || "empty.jpg") + '" onerror="this.src=\'empty.jpg\'">' +
      '<a href="' + getUserPageLink(u) + '">@' + escapeHtml(u) + '</a>';
    list.appendChild(d);
  }
}
function closeModal(){ document.getElementById("modalBackdrop").classList.remove("open"); }

async function load(){
  const{data:user}=await sb.from("users").select("pic,bio,banner,spotify_data,verified,is_developer").ilike("username",me).maybeSingle();
  const{count:fc}=await sb.from("follows").select("*",{count:"exact",head:true}).ilike("following",me);
  const{count:fgc}=await sb.from("follows").select("*",{count:"exact",head:true}).ilike("follower",me);
  const{data:posts}=await sb.from("posts").select("id,text,created_at").ilike("username",me).order("created_at",{ascending:false});
  const postIds = (posts || []).map(p => p.id);
  const [{ data: polls }, { data: pollVotes }] = await Promise.all([
    postIds.length ? sb.from("polls").select("*").in("post_id", postIds) : Promise.resolve({ data: [] }),
    postIds.length ? sb.from("poll_votes").select("post_id,option_index").in("post_id", postIds).eq("username", me) : Promise.resolve({ data: [] })
  ]);
  const pollMap = {};
  (polls || []).forEach(pl => { pollMap[pl.post_id] = pl.options; });
  const myVoteMap = {};
  (pollVotes || []).forEach(pv => { myVoteMap[pv.post_id] = pv.option_index; });
  document.getElementById("uname").innerText="@"+me;
  if(user){
    if (user.spotify_data) displaySelectedMusic(user.spotify_data);
    let badges = '';
    if(user.verified) badges += ' <span class="badge-icon badge-verified" data-title="Verified User">&nbsp;</span>';
    if(user.is_developer) badges += ' <span class="badge-icon badge-developer" data-title="Developer">&nbsp;</span>';
    document.getElementById("uname").innerHTML = "@" + escapeHtml(me) + badges;
    document.getElementById("picDisplay").src=user.pic||"empty.jpg";
    document.getElementById("bioDisplay").innerText=user.bio||"No bio yet.";
    document.getElementById("bioInput").value=user.bio||"";
    if(user.banner){
      document.getElementById("userBanner").style.backgroundImage="url('"+user.banner+"')";
      document.getElementById("userBanner").style.display="block";
    }
  }
  document.getElementById("sF").innerText=fc||0;
  document.getElementById("sFg").innerText=fgc||0;
  document.getElementById("sP").innerText=(posts||[]).length;
  const el=document.getElementById("myPosts");
  if(!posts||!posts.length){el.innerHTML="<div style='color:#888;font-style:italic;'>No posts yet.</div>";return;}
  el.innerHTML="";
  for(const p of posts){
    let pollHtml = '';
    if (pollMap[p.id]) {
      const options = pollMap[p.id];
      const myVote = myVoteMap[p.id];
      const totalVotes = options.reduce((sum, opt) => sum + (opt.votes||0), 0);
      pollHtml = '<div class="poll-container" style="margin:10px 0;background:#f9f9f9;border:1px solid #eee;border-radius:4px;padding:10px;">';
      options.forEach((opt, idx) => {
        const pct = totalVotes > 0 ? Math.round(((opt.votes||0) / totalVotes) * 100) : 0;
        const isMyVote = myVote === idx;
        pollHtml += '<div class="poll-option" style="margin-bottom:6px;position:relative;cursor:pointer;" onclick="votePoll('+p.id+', '+idx+')">'+
                      '<div class="poll-bar" style="position:absolute;left:0;top:0;bottom:0;background:'+(isMyVote?'#d0e0ff':'#e0e0e0')+';width:'+pct+'%;border-radius:2px;z-index:1;"></div>'+
                      '<div style="position:relative;z-index:2;display:flex;justify-content:space-between;padding:4px 8px;font-size:13px;font-weight:'+(isMyVote?'bold':'normal')+';">'+
                        '<span>'+escapeHtml(opt.text)+' '+(isMyVote?'<span class="material-icons" style="font-size:14px;vertical-align:middle;">check</span>':'')+'</span><span>'+pct+'%</span>'+
                      '</div>'+
                    '</div>';
      });
      pollHtml += '<div style="font-size:11px;color:#888;text-align:right;">'+totalVotes+' vote'+(totalVotes!==1?'s':'')+'</div></div>';
    }

    const d=document.createElement("div");d.className="post";
    d.innerHTML='<div style="line-height:1.5;margin-bottom:4px;">'+escapeHtml(p.text)+'</div>' + pollHtml + '<div style="font-size:11px;color:#888;">'+timeAgo(p.created_at)+'</div>';
    el.appendChild(d);
  }
}
load();

// Handled by theme.js
</script>
</body>
</html>
